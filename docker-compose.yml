version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: retailiq-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retailiq

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: retailiq-api

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    working_dir: /app

volumes:
  postgres_data: